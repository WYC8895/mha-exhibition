<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MHA 原畫展 - 購物小幫手</title>
    <style>
        body { font-family: 'Segoe UI', 'Noto Sans TC', sans-serif; background: #f8f9fa; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: linear-gradient(135deg, #0047ab 0%, #ffcf00 100%); color: white; padding: 20px; border-radius: 10px; margin-bottom: 20px; text-align: center; }
        .sync-status { text-align: center; font-size: 12px; margin-bottom: 15px; color: #666; font-weight: bold; }
        
        /* 匯率調整區 */
        .rate-config { background: #eef2f7; padding: 10px; border-radius: 8px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .rate-input { width: 80px; padding: 5px; border: 2px solid #0047ab; border-radius: 4px; text-align: center; font-weight: bold; color: #0047ab; }

        .input-grid { display: grid; grid-template-columns: 2fr 1fr 0.8fr 0.8fr 1fr; gap: 10px; margin-bottom: 20px; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; }
        .table-input { width: 60px; padding: 5px; border: 1px solid #ccc; border-radius: 4px; text-align: center; font-weight: bold; }
        button { padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; border: none; }
        .add-btn { background: #0047ab; color: white; }
        .cloud-btn { background: #28a745; color: white; margin-left: 5px; }
        .load-btn { background: #17a2b8; color: white; margin-left: 5px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th { background: #f1f5f9; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; color: #444; }
        td { padding: 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
        
        .currency-label { font-size: 11px; background: #eee; padding: 2px 4px; border-radius: 3px; margin-right: 4px; color: #666; }
        .currency-jp { color: #666; font-size: 0.95em; }
        .currency-tw { color: #d32f2f; font-weight: bold; }
        .warning-input { border: 2px solid #ff0000 !important; background: #fff0f0; color: #ff0000; }
        
        .total-box { margin-top: 25px; padding: 15px; background: #fffde7; border-radius: 8px; display: flex; justify-content: flex-end; gap: 40px; border: 1px solid #ffe57f; }
        .total-item { text-align: right; }
        .total-val { font-size: 1.5em; font-weight: bold; }
        .val-jp { color: #666; }
        .val-tw { color: #d32f2f; }
        .del-btn { color: #ccc; cursor: pointer; background: none; font-size: 18px; }
        .del-btn:hover { color: red; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2 style="margin:0;">MHA 原畫展 購物小幫手</h2>
        <p style="margin:5px 0 0; font-size: 0.8em; opacity: 0.9;">即時換算單價與小計</p>
    </div>

    <div id="status" class="sync-status">狀態：正在載入最新資料...</div>

    <div class="rate-config">
        <span>當前匯率 1 JPY = </span>
        <input type="number" id="currentRate" class="rate-input" value="0.20" step="0.01" onchange="updateRate()">
        <span> TWD</span>
    </div>

    <div class="input-grid">
        <input type="text" id="name" placeholder="品名">
        <input type="number" id="jpy" placeholder="日幣單價">
        <input type="number" id="qty" placeholder="數量">
        <input type="number" id="limit" placeholder="限購">
        <button class="add-btn" onclick="addItem()">新增項目</button>
    </div>

    <div style="text-align: right; margin-bottom: 15px;">
        <button class="cloud-btn" onclick="saveToCloud()">⬆️ 手動同步</button>
        <button class="load-btn" onclick="loadFromCloud()">⬇️ 強制刷新</button>
    </div>

    <table>
        <thead>
            <tr>
                <th width="25%">品名</th>
                <th width="20%">數量 / 限購</th>
                <th width="22%">單價 (日/台)</th>
                <th width="23%">小計 (日/台)</th>
                <th width="10%"></th>
            </tr>
        </thead>
        <tbody id="listBody"></tbody>
    </table>

    <div class="total-box">
        <div class="total-item">
            <div style="font-size: 0.8em; color: #666;">總計日幣 (JPY)</div>
            <div class="total-val val-jp">¥ <span id="grandTotalJP">0</span></div>
        </div>
        <div class="total-item">
            <div style="font-size: 0.8em; color: #666;">總計台幣 (TWD)</div>
            <div class="total-val val-tw">NT$ <span id="grandTotalTW">0</span></div>
        </div>
    </div>
</div>

<script>
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbzRcvjg07Hu-2oQCh-IVM14N3fmROGoahME_zVcs2-z4U65XGXiVX6TMC82izNu-lBPtg/exec'; 
    let data = [];
    let RATE = 0.20;

    window.onload = loadFromCloud;

    // 更新匯率功能
    function updateRate() {
        RATE = Number(document.getElementById('currentRate').value);
        render();
        saveToCloud(); // 匯率變動也同步到雲端
    }

    async function saveToCloud() {
        document.getElementById('status').innerText = '☁️ 同步中...';
        const payload = {
            action: 'save',
            items: data,
            rate: RATE // 將目前匯率一起存進去
        };
        try {
            await fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) });
            document.getElementById('status').innerText = '✅ 資料已雲端同步';
        } catch (e) {
            document.getElementById('status').innerText = '❌ 同步失敗';
        }
    }

    async function loadFromCloud() {
        document.getElementById('status').innerText = '⏳ 載入中...';
        try {
            const resp = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ action: 'load' }) });
            const result = await resp.json();
            
            // 如果雲端有回傳匯率，就更新它
            if (result.items) {
                data = result.items;
                // 假設我們在 GAS 那邊也處理匯率，這裡示範如何從資料中恢復
                // 為了簡單起見，如果 result 帶有匯率欄位就更新：
                if (result.rate) {
                    RATE = result.rate;
                    document.getElementById('currentRate').value = RATE;
                }
            } else {
                data = result; // 相容舊版資料格式
            }
            
            render();
            document.getElementById('status').innerText = '✅ 載入成功';
        } catch (e) {
            document.getElementById('status').innerText = '❌ 載入失敗';
        }
    }

    function addItem() {
        const item = {
            id: Date.now(),
            name: document.getElementById('name').value,
            jpy: Number(document.getElementById('jpy').value),
            qty: Number(document.getElementById('qty').value),
            limit: Number(document.getElementById('limit').value)
        };
        if (!item.name || !item.jpy) return alert("填寫完整喔！");
        data.push(item);
        render();
        saveToCloud();
        document.getElementById('name').value = '';
        document.getElementById('jpy').value = '';
        document.getElementById('qty').value = '';
        document.getElementById('limit').value = '';
    }

    function updateQty(id, val) {
        const i = data.findIndex(x => x.id === id);
        data[i].qty = Number(val);
        render();
        saveToCloud();
    }

    function deleteItem(id) {
        if(confirm('確定要刪除嗎？')) {
            data = data.filter(x => x.id !== id);
            render();
            saveToCloud();
        }
    }

    function render() {
        const body = document.getElementById('listBody');
        body.innerHTML = '';
        let totalJP = 0;
        let totalTW = 0;

        data.forEach(item => {
            const singleTW = Math.round(item.jpy * RATE);
            const subJP = item.jpy * item.qty;
            const subTW = singleTW * item.qty;
            totalJP += subJP;
            totalTW += subTW;
            const isOverLimit = item.qty > item.limit;
            
            body.innerHTML += `
                <tr>
                    <td><strong>${item.name}</strong></td>
                    <td>
                        <input type="number" class="table-input ${isOverLimit ? 'warning-input' : ''}" value="${item.qty}" onchange="updateQty(${item.id}, this.value)">
                        <span style="margin: 0 5px;">/</span>
                        <span style="font-weight:bold;">${item.limit}</span>
                    </td>
                    <td>
                        <div class="currency-jp"><span class="currency-label">日</span>¥${item.jpy.toLocaleString()}</div>
                        <div class="currency-tw"><span class="currency-label">台</span>NT$${singleTW.toLocaleString()}</div>
                    </td>
                    <td>
                        <div class="currency-jp"><span class="currency-label">日</span>¥${subJP.toLocaleString()}</div>
                        <div class="currency-tw"><span class="currency-label">台</span>NT$${subTW.toLocaleString()}</div>
                    </td>
                    <td><button class="del-btn" onclick="deleteItem(${item.id})">✕</button></td>
                </tr>
            `;
        });
        document.getElementById('grandTotalJP').innerText = totalJP.toLocaleString();
        document.getElementById('grandTotalTW').innerText = totalTW.toLocaleString();
    }
</script>
</body>
</html>
